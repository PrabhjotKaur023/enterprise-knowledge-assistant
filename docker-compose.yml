version: "3.9"

services:
  app:
    build:
      context: .
      target: runtime
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Persist data outside the container
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: swap to Postgres in production by uncommenting this
  # and changing DATABASE_URL in .env to postgresql://user:pass@db:5432/knowledge_db
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: kauser
      POSTGRES_PASSWORD: kapassword
      POSTGRES_DB: knowledge_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    profiles:
      - postgres  # only started with: docker compose --profile postgres up

volumes:
  postgres_data:
